[book]
title = "Monel Language Specification"
description = "The specification for the Monel programming language"
authors = ["Monel Contributors"]
language = "en"
src = "spec"

[build]
build-dir = "target/book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/monel-io/monel"

[output.html.fold]
enable = true
level = 1

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = false
